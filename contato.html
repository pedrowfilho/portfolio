<!DOCTYPE html>
<html lang="pt-br">
<head>
	<title>Contato</title>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<link rel="stylesheet" type="text/css" href="css/style.css">
</head>
<body>
	<div class="topo">
		<div class="logo">
			<a href="index.html"><img src="img/logo.png" alt="logomarca pedro wagner"></a>
		</div>
		<div class="menu">
			<nav>
				<ul>
					<li><a href="index.html">Home</a></li>
					<li><a href="sobre.html">Sobre</a></li>
					<li><a href="portfolio.html">Portolio</a></li>
					<li><a href="contato.html">Contato</a></li>
				</ul>
			</nav>
		</div>
	</div>
	<div class="fadeIn">
		<div class="container">
			<form>
				<div class="mySlides2">
					<h1>Contato</h1>
					<fieldset class="grupo">
						<div class="campo">
							<label for="nome">Nome:</label>
							<input type="text" name="nome" id="nome" />
						</div>
						<div class="campo">
							<label for="sobrenome">Sobrenome:</label>
							<input type="text" name="sobrenome" id="sobrenome" />
						</div>
					</fieldset>
					<fieldset class="grupo">
				        <div class="campo">
				            <label for="email">E-mail</label>
				            <input type="email" id="email" name="email" value="">
				        </div>
				        <div class="campo">
				            <label for="telefone">Telefone</label>
				            <input type="tel" id="telefone" name="telefone" value="">
				        </div>
				    </fieldset>
				    <fieldset class="grupo">
			            <div class="campo">
			                <label for="cidade">Cidade</label>
			                <input type="text" id="cidade" name="cidade" value="">
			            </div>
			            <div class="campo">
			                <label for="estado">Estado</label>
			                <select name="estado" id="estado">
			                    <option value="">Selecione</option>
							    <option value="AC">Acre</option>
							    <option value="AL">Alagoas</option>
							    <option value="AP">Amapá</option>
							    <option value="AM">Amazonas</option>
							    <option value="BA">Bahia</option>
							    <option value="CE">Ceará</option>
							    <option value="DF">Distrito Federal</option>
							    <option value="ES">Espirito Santo</option>
							    <option value="GO">Goiás</option>
							    <option value="MA">Maranhão</option>
							    <option value="MS">Mato Grosso do Sul</option>
							    <option value="MT">Mato Grosso</option>
							    <option value="MG">Minas Gerais</option>
							    <option value="PA">Pará</option>
							    <option value="PB">Paraíba</option>
							    <option value="PR">Paraná</option>
							    <option value="PE">Pernambuco</option>
							    <option value="PI">Piauí</option>
							    <option value="RJ">Rio de Janeiro</option>
							    <option value="RN">Rio Grande do Norte</option>
							    <option value="RS">Rio Grande do Sul</option>
							    <option value="RO">Rondônia</option>
							    <option value="RR">Roraima</option>
							    <option value="SC">Santa Catarina</option>
							    <option value="SP">São Paulo</option>
							    <option value="SE">Sergipe</option>
							    <option value="TO">Tocantins</option>
			                </select>
			            </div>
		        	</fieldset>
		        	<fieldset class="grupo">
				        <div class="campo">
				            <label for="mensagem">Mensagem</label>
				            <textarea rows="6" id="mensagem" name="mensagem"></textarea>
				        </div>
				    </fieldset>
				    <button type="submit" class="botao" name="submit">Enviar</button>
				</div>
				<div class="social">
					<a href="https://www.linkedin.com/in/pedro-wagner-559a9b54/" target="_blank"><img src="img/social/linkedin.png" alt="linkedin"></a>
					<a href="https://twitter.com/wagnimm" target="_blank"><img src="img/social/twitter.png" alt="twitter"></a>
			    	<a href="https://www.facebook.com/wagnim.filho" target="_blank"><img src="img/social/facebook.png" alt="facebook"></a>
			    	<a href="https://www.instagram.com/wagnimfilho/" target="_blank"><img src="img/social/instagram.png" alt="instagram"></a>
				</div>
			</form>
		</div>
	</div>
</body>
</html>
